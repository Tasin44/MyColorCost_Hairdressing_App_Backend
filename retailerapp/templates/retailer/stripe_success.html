<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #E293D3 0%, #F093BA 50%, #FF8FAB 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .container {
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .success-icon {
        font-size: 60px;
        color: #10b981;
        margin-bottom: 20px;
    }
    
    h1 {
        color: #1f2937;
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 600;
    }
    
    p {
        color: #6b7280;
        margin-bottom: 20px;
        font-size: 15px;
        line-height: 1.6;
    }
    
    .account-id {
        background: #f9fafb;
        padding: 15px;
        border-radius: 12px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: #E293D3;
        margin: 20px 0;
        border: 2px dashed #E293D3;
    }
    
    .btn {
        display: inline-block;
        background: linear-gradient(135deg, #E293D3 0%, #FF8FAB 100%);
        color: white;
        padding: 14px 35px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        margin-top: 20px;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 10px 30px rgba(226, 147, 211, 0.4);
        border: none;
        cursor: pointer;
    }
    
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(226, 147, 211, 0.5);
    }
</style>

</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Connected Successfully!</h1>
        <p><strong>{{ business_name }}</strong>, your Stripe account is now connected.</p>
        <p>You can now receive payments from customers.</p>
        <div class="account-id">Account ID: {{ account_id }}</div>
        <a href="/" class="btn">Go to Dashboard</a>
    </div>
</body>
</html>
