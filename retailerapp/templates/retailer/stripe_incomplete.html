<!DOCTYPE html>
<html>
<head>
    <title>Stripe Setup Incomplete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        .warning-icon {
            font-size: 60px;
            color: #ffc107;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            background: #ffc107;
            color: #333;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px 5px;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠</div>
        <h1>Setup Incomplete</h1>
        <p>Your Stripe onboarding is not complete. Please finish the setup to start receiving payments.</p>
        <a href="{{ retry_url }}" class="btn">Retry Onboarding</a>
        <a href="/" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</body>
</html>
