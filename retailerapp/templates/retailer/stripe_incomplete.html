<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #E293D3 0%, #F093BA 50%, #FF8FAB 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .container {
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .warning-icon {
        font-size: 60px;
        color: #fbbf24;
        margin-bottom: 20px;
    }
    
    h1 {
        color: #1f2937;
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 600;
    }
    
    p {
        color: #6b7280;
        margin-bottom: 20px;
        font-size: 15px;
        line-height: 1.6;
    }
    
    .btn {
        display: inline-block;
        background: linear-gradient(135deg, #E293D3 0%, #FF8FAB 100%);
        color: white;
        padding: 14px 35px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        margin: 10px 5px;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 10px 30px rgba(226, 147, 211, 0.4);
        border: none;
        cursor: pointer;
    }
    
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(226, 147, 211, 0.5);
    }
    
    .btn-secondary {
        background: #f3f4f6;
        color: #1f2937;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    .btn-secondary:hover {
        background: #e5e7eb;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
</style>

</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠</div>
        <h1>Setup Incomplete</h1>
        <p>Your Stripe onboarding is not complete. Please finish the setup to start receiving payments.</p>
        <a href="{{ retry_url }}" class="btn">Retry Onboarding</a>
        <a href="/" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</body>
</html>
