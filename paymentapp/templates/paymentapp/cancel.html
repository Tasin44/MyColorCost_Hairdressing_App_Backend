<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #E293D3 0%, #F093BA 50%, #FF8FAB 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .container {
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .cancel-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #E293D3 0%, #FF8FAB 100%);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px;
    }
    
    .cancel-icon svg {
        width: 50px;
        height: 50px;
        stroke: white;
        stroke-width: 3;
        fill: none;
    }
    
    h1 {
        color: #1f2937;
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 600;
    }
    
    .subtitle {
        color: #6b7280;
        font-size: 16px;
        margin-bottom: 30px;
    }
    
    .btn {
        display: inline-block;
        background: linear-gradient(135deg, #E293D3 0%, #FF8FAB 100%);
        color: white;
        padding: 14px 35px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        margin: 10px;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 10px 30px rgba(226, 147, 211, 0.4);
    }
    
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(226, 147, 211, 0.5);
    }
</style>
</head>
<body>
    <div class="container">
        <div class="cancel-icon">
            <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
        
        <h1>Payment Cancelled</h1>
        <p class="subtitle">Your order was not completed</p>
        
        <p style="color: #6b7280; margin: 20px 0;">
            Don't worry! Your cart items are still saved.<br>
            You can try again whenever you're ready.
        </p>
        
        <!-- <div style="margin-top: 30px;">
            <a href="/shop/cart/" class="btn">Back to Cart</a>
        </div> -->
    </div>
</body>
</html>
