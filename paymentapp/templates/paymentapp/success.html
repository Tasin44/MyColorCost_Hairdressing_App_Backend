 <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #E293D3 0%, #F093BA 50%, #FF8FAB 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .container {
        background: white;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 100%;
        padding: 50px 40px;
        text-align: center;
        animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .success-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #E293D3 0%, #FF8FAB 100%);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 20px;
        animation: scaleIn 0.5s ease-out 0.2s both;
    }
    
    @keyframes scaleIn {
        from {
            transform: scale(0);
        }
        to {
            transform: scale(1);
        }
    }
    
    .success-icon svg {
        width: 50px;
        height: 50px;
        stroke: white;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    
    h1 {
        color: #1f2937;
        font-size: 28px;
        margin-bottom: 10px;
        font-weight: 600;
    }
    
    .subtitle {
        color: #6b7280;
        font-size: 16px;
        margin-bottom: 30px;
    }
    
    .details {
        background: #f9fafb;
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
        text-align: left;
    }
    
    .detail-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #e5e7eb;
    }
    
    .detail-row:last-child {
        border-bottom: none;
    }
    
    .detail-label {
        color: #6b7280;
        font-size: 14px;
    }
    
    .detail-value {
        color: #1f2937;
        font-weight: 600;
        font-size: 14px;
    }
    
    .session-id {
        background: #f9fafb;
        padding: 15px;
        border-radius: 12px;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: #E293D3;
        word-break: break-all;
        margin-bottom: 30px;
        border: 2px dashed #E293D3;
    }
    
    .btn {
        display: inline-block;
        background: linear-gradient(135deg, #E293D3 0%, #FF8FAB 100%);
        color: white;
        padding: 14px 30px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        margin: 5px;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: 0 10px 30px rgba(226, 147, 211, 0.4);
    }
    
    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(226, 147, 211, 0.5);
    }
    
    .btn-secondary {
        background: #f3f4f6;
        color: #1f2937;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    .btn-secondary:hover {
        background: #e5e7eb;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
    
    .info-text {
        color: #6b7280;
        font-size: 13px;
        margin-top: 20px;
        line-height: 1.8;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1>Payment Successful!</h1>
        <p class="subtitle">Your order has been confirmed</p>
        
        <div class="details">
            <div class="detail-row">
                <span class="detail-label">Order ID</span>
                <span class="detail-value">#{{ payment_id }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount Paid</span>
                <span class="detail-value">£{{ total_amount }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Payment Method</span>
                <span class="detail-value">Card ending •••• {{ card_last4 }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value" style="color: #10b981;">✓ Completed</span>
            </div>
        </div>
        
        <!-- <div class="session-id">
            <strong>Session ID:</strong><br>
            {{ session_id }}
        </div> -->
        
        <div class="info-text">
            ✓ Payment has been split to retailers<br>
            ✓ Delivery will be processed soon<br>
            <!-- ✓ You'll receive an email confirmation shortly -->
        </div>

            <a href="/shop/cart/" class="btn">Continue Shopping</a>
            <a href="/payment/history/" class="btn btn-secondary">View Order History</a>
        </div> -->
    </div>
</body>
