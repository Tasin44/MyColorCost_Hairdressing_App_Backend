services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: grace_db
    environment:
      POSTGRES_DB: ${DB_NAME:-color_grase_db}

      POSTGRES_USER: ${DB_USER:-lazy_alien}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aTm8/UyJSFBN}
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    networks:
      - grace_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lazy_alien}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grace_web
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 myproject.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
      - db_volume:/app/db

    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DB_NAME: ${DB_NAME:-color_grase_db}
      DB_USER: ${DB_USER:-lazy_alien}
      DB_PASSWORD: ${DB_PASSWORD:-aTm8/UyJSFBN}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - grace_network
    restart: unless-stopped

volumes:
  postgres_volume:
  db_volume:
  static_volume:
  media_volume:
  logs_volume:

networks:
  grace_network:
    driver: bridge
