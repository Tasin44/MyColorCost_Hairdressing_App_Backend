    <script>
        const token = window.location.pathname.split('/').filter(Boolean).pop();
        let bookingData = null;
        let selectedTimeSlot = null;

        // ✅ Show debug message
        function showDebug(message, type = 'error') {
            const debugBox = document.getElementById('debug-services');
            debugBox.className = type === 'error' ? 'debug-box debug-error' : 'debug-box debug-success';
            debugBox.textContent = message;
            debugBox.style.display = 'block';
            
            // Auto-hide success messages after 3 seconds
            if (type === 'success') {
                setTimeout(() => {
                    debugBox.style.display = 'none';
                }, 3000);
            }
        }

        // Load booking page data
        async function loadBookingData() {
            try {
                const response = await fetch(`/appointment/book/${token}/data/`);
                const result = await response.json();
                
                console.log('Full API Response:', result);
                
                if (!result.success) {
                    document.getElementById('loading').innerHTML = 
                        `<div class="error-msg">${result.message}</div>`;
                    return;
                }

                bookingData = result.data;
                
                console.log('Booking Data:', bookingData);
                console.log('Services:', bookingData.services);
                
                // Set salon name
                document.getElementById('salon-name').textContent = 
                    `${bookingData.salon_name} - Salon Services`;
                
                // ✅ Populate services with validation
                const serviceSelect = document.getElementById('service_type_id');
                serviceSelect.innerHTML = '<option value="">Choose a service</option>';
                
                // Validate services data
                if (!bookingData.services || !Array.isArray(bookingData.services)) {
                    console.error('Services data is missing or invalid:', bookingData.services);
                    showDebug('ERROR: No services found. Please contact salon owner.', 'error');
                    return;
                }
                
                if (bookingData.services.length === 0) {
                    console.warn('Services array is empty');
                    showDebug('ERROR: No services available. Please contact salon owner.', 'error');
                    return;
                }
                
                // Add services to dropdown
                bookingData.services.forEach((service, index) => {
                    console.log(`Service ${index}:`, service);
                    
                    const option = document.createElement('option');
                    option.value = service.id;
                    option.textContent = service.name;
                    //option.style.color = '#1f2937';
                    serviceSelect.appendChild(option);
                });
                
                console.log('Total services added:', serviceSelect.options.length - 1);
                
                // Show success message
                if (serviceSelect.options.length > 1) {
                    showDebug(`✓ ${serviceSelect.options.length - 1} service(s) loaded successfully`, 'success');
                }
                
                // Set min date to today
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('appointment_date').setAttribute('min', today);
                
                // Show form
                document.getElementById('loading').style.display = 'none';
                document.getElementById('booking-form').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading booking data:', error);
                document.getElementById('loading').innerHTML = 
                    `<div class="error-msg">Failed to load booking page: ${error.message}</div>`;
            }
        }

        // Check if selected date is off day
        function isOffDay(date) {
            const dayOfWeek = new Date(date).getDay();
            const adjustedDay = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            return bookingData.working_hours.off_days.includes(adjustedDay);
        }

        // Load available time slots
        async function loadTimeSlots(date) {
            const timeSlotsContainer = document.getElementById('time-slots');
            const timeSlotWrapper = document.getElementById('time-slot-container');
            const offDayMessage = document.getElementById('off-day-message');

            timeSlotsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">Loading...</div>';
            timeSlotWrapper.style.display = 'block';
            offDayMessage.style.display = 'none';

            // Check if off day
            if (isOffDay(date)) {
                timeSlotWrapper.style.display = 'none';
                offDayMessage.textContent = 'This day is closed. Please select another date.';
                offDayMessage.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`/appointment/available-slots/?date=${date}&user_id=${bookingData.user_id}`);
                const result = await response.json();

                if (!result.success) {
                    timeSlotsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #EF4444;">Failed to load time slots</div>';
                    return;
                }

                const slots = result.data.available_slots;
                timeSlotsContainer.innerHTML = '';

                if (slots.length === 0) {
                    timeSlotsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">No slots available</div>';
                    return;
                }

                slots.forEach(slot => {
                    const slotDiv = document.createElement('div');
                    slotDiv.className = 'time-slot';
                    slotDiv.textContent = slot.time_slot;

                    if (!slot.is_available) {
                        slotDiv.classList.add('unavailable');
                    } else {
                        slotDiv.addEventListener('click', () => selectTimeSlot(slot.time_slot, slotDiv));
                    }

                    timeSlotsContainer.appendChild(slotDiv);
                });

            } catch (error) {
                timeSlotsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #EF4444;">Error loading slots</div>';
                console.error(error);
            }
        }

        // Select time slot
        function selectTimeSlot(time, element) {
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedTimeSlot = time;
            document.getElementById('appointment_time').value = time;
        }

        // Handle date change
        document.getElementById('appointment_date').addEventListener('change', (e) => {
            const selectedDate = e.target.value;
            if (selectedDate) {
                loadTimeSlots(selectedDate);
            }
        });

        // Handle form submission
        document.getElementById('appointment-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate service selection
            const serviceId = document.getElementById('service_type_id').value;
            if (!serviceId) {
                alert('Please select a service');
                return;
            }

            if (!selectedTimeSlot) {
                alert('Please select a time slot');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Booking...';

            const formData = {
                client_name: document.getElementById('client_name').value,
                client_contact: document.getElementById('client_contact').value,
                client_email: document.getElementById('client_email').value,
                service_type_id: parseInt(serviceId),
                appointment_date: document.getElementById('appointment_date').value,
                appointment_time: selectedTimeSlot
            };
            
            console.log('Sending booking data:', formData);
            
            try {
                const response = await fetch(`/appointment/book/${token}/data/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value,
                    },
                    body: JSON.stringify(formData)
                });
                // ✅ Check content type before parsing JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    console.error('Server returned HTML. Status:', response.status);
                    alert(`Server error (${response.status}). Open Network tab to see details.`);
                    return;
                }
                const result = await response.json();
                console.log('Server response:', result);

                if (result.success) {
                    document.getElementById('success-message').style.display = 'block';
                    document.getElementById('appointment-form').reset();
                    document.getElementById('time-slot-container').style.display = 'none';
                    selectedTimeSlot = null;

                    // Scroll to top to show success message
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                    setTimeout(() => {
                        document.getElementById('success-message').style.display = 'none';
                    }, 5000);
                } else {
                    const errorMsg = result.message || 'Booking failed';
                    const errorDetails = result.data ? JSON.stringify(result.data, null, 2) : '';
                    alert(`${errorMsg}\n\nDetails:\n${errorDetails}`);
                    console.error('Booking error:', result);
                }

            } catch (error) {
                alert('Error booking appointment: ' + error.message);
                console.error('Request error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Book Appointment';
            }
        });

        // Initialize
        loadBookingData();
    </script>
</body>
</html>
